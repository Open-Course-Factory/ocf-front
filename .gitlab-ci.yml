# ============================================================================
# Workflow rules — avoid duplicate pipelines
# When an MR is open for a branch, only the MR pipeline runs (skip the
# branch-push pipeline that would duplicate the same tests).
# ============================================================================

workflow:
  rules:
    # Tags always run (release pipelines)
    - if: $CI_COMMIT_TAG
    # MR events always run
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    # Skip branch-push pipelines when an MR is open for that branch
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    # Plain branch push (no MR) still runs — e.g. main after merge
    - if: $CI_COMMIT_BRANCH

default:
  tags:
    - ocf-core

# ============================================================================
# Variables
# ============================================================================

variables:
  NODE_VERSION: "22"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# ============================================================================
# Stages
# ============================================================================

stages:
  - test     # Used in release component
  - check    # Version validation and auto-tagging
  - build    # Docker image creation on release tags
  - release  # Release creation

# ============================================================================
# Cache Configuration
# ============================================================================

.npm_cache:
  cache:
    key: "${CI_COMMIT_REF_SLUG}-npm"
    paths:
      - node_modules/
      - .npm/

# ============================================================================
# Test & Type-Check
# ============================================================================

unit-tests:
  stage: test
  image: node:${NODE_VERSION}
  extends: .npm_cache
  script:
    - npm ci --prefer-offline
    - npm test
  artifacts:
    when: always
    reports:
      junit: reports/junit.xml
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always

typecheck:
  stage: test
  image: node:${NODE_VERSION}
  extends: .npm_cache
  script:
    - npm ci --prefer-offline
    - npx vue-tsc --noEmit
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - when: always

# ============================================================================
# Release Component
# ============================================================================

include:
  - component: usine.solution-libre.fr/gitlab/components/release/default@0.3.2
    inputs:
      # Enable all new features
      enable_version_check: true
      enable_docker_build: true
      enable_enhanced_release_notes: true

      # Configure stages to match our pipeline
      check_stage: check
      build_stage: build
      stage: release

      # Version management
      version_file: "VERSION"
      main_branch: "main"
      tag_prefix: "v"

      # Docker build
      dockerfile_path: "Dockerfile"
      build_context: "."

      # Disable old changelog component (using enhanced notes instead)
      disable_changelog: true
