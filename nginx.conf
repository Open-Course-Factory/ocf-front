server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve file if exists, otherwise fall back to index.html
    # no-cache so browsers always get the latest index.html after redeployments
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Vite-hashed assets: aggressive caching (content-hash in filename = safe)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Reverse proxy for Incus UI admin iframe (replaces Vite's server.proxy)
    # WebSocket-aware for Incus console connections
    location /api/v1/incus-ui/ {
        proxy_pass ${INCUS_PROXY_TARGET};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Incus UI can be slow to respond
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check endpoint for K8s readiness probe
    location = /healthz {
        access_log off;
        return 200 "ok";
    }

    # Reduce noise in logs
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
